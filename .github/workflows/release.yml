name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.binary_name }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - binary_name: prompter
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - binary_name: prompter
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - binary_name: prompter
            target: aarch64-apple-darwin
            os: macos-latest
          - binary_name: unvenv
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - binary_name: unvenv
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - binary_name: unvenv
            target: aarch64-apple-darwin
            os: macos-latest
          - binary_name: asana-cli
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - binary_name: asana-cli
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - binary_name: asana-cli
            target: aarch64-apple-darwin
            os: macos-latest
          - binary_name: todoer
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - binary_name: todoer
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - binary_name: todoer
            target: aarch64-apple-darwin
            os: macos-latest
          - binary_name: gator
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - binary_name: gator
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - binary_name: gator
            target: aarch64-apple-darwin
            os: macos-latest
          - binary_name: silent-critic
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - binary_name: silent-critic
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - binary_name: silent-critic
            target: aarch64-apple-darwin
            os: macos-latest
          - binary_name: bce
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - binary_name: bce
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - binary_name: bce
            target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ${{ matrix.binary_name }}
          target: ${{ matrix.target }}
          tar: unix
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish workspace crates to crates.io
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates in dependency order
        run: |
          publish_crate() {
            crate="$1"
            for attempt in 1 2 3 4 5; do
              if cargo publish -p "$crate" --no-verify; then
                return 0
              fi
              if [ "$attempt" -eq 5 ]; then
                echo "failed to publish $crate after $attempt attempts" >&2
                return 1
              fi
              sleep 15
            done
          }

          publish_crate tftio-cli-common
          publish_crate tftio-prompter
          publish_crate tftio-unvenv
          publish_crate tftio-asana-cli
          publish_crate tftio-todoer
          publish_crate tftio-silent-critic
          publish_crate tftio-gator
          publish_crate tftio-bsky-comment-extractor
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
