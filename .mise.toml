# tftio-stuff/tools - Tool Version Management
#
# mise is the single source of truth for pinned tool versions.
# Rust toolchain is NOT managed here -- rustup owns stable + nightly.
#
# Usage:
#   mise install        # install all tools
#   mise current        # show active versions
#   mise outdated       # check for updates

[tools]
just = "1.40.0"
shellcheck = "0.11.0"
"cargo:cargo-audit" = "0.22.1"
"cargo:cargo-deny" = "0.19.0"
"github:j178/prek" = "0.3.5"
